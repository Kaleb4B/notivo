name: Build Notivo Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --name "Notivo" --windowed --add-data "assets;assets" --add-data "ui;ui" --add-data "audio;audio" --add-data "transcription;transcription" --add-data "summary;summary" --add-data "utils;utils" --add-data "storage;storage" --add-data "models;models" --hidden-import "markdown" --hidden-import "speech_recognition" --hidden-import "PySide6" --noconfirm app.py

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --name "Notivo" --windowed --icon "assets/logo.icns" --add-data "assets:assets" --add-data "ui:ui" --add-data "audio:audio" --add-data "transcription:transcription" --add-data "summary:summary" --add-data "utils:utils" --add-data "storage:storage" --add-data "models:models" --hidden-import "markdown" --hidden-import "speech_recognition" --hidden-import "PySide6" --noconfirm app.py

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Notivo-Windows
        path: dist/Notivo

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Notivo-macOS
        path: dist/Notivo.app
